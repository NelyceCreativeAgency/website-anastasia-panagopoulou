  eyebrow_en: About Us
  title_el: Η εκπαιδευτική μας πορεία
  title_en: Our educational journey
  lead_el: Μια ιστορία που συνεχίζει να μεγαλώνει.
  lead_en: A story that keeps growing.
history:
  text2_el: Όλα αυτά τα χρόνια, είχαμε τη χαρά να γνωρίσουμε εκατοντάδες μαθητές
    και να γίνουμε μέρος της εκπαιδευτικής τους πορείας. Σήμερα, συνεχίζουμε με
    την ίδια αγάπη για τη διδασκαλία και την ίδια προσωπική προσέγγιση που μας
    χαρακτηρίζει από την πρώτη μέρα.
  text1_el: Από το 1988 βρισκόμαστε στο Κορωπί, βοηθώντας παιδιά, εφήβους και
    ενήλικες να χτίσουν τη σχέση τους με την αγγλική γλώσσα.
  text2_en: Over all these years, we have had the joy of getting to know hundreds
    of students and becoming part of their educational journey. Today, we
    continue with the same love for teaching and the same personal approach that
    has defined us from day one.
  text1_en: Since 1988 we have been based in Koropi, helping children, teenagers
    and adults build their relationship with the English language.
  title_el: Ξεκινήσαμε το 1988
  title_en: We started in 1988
  image: ../Images/front.webp
  eyebrow_el: Η ιστορία μας
  eyebrow_en: Our history
teacher:
  eyebrow_el: Η καθηγήτρια
  eyebrow_en: Our teacher
  text1_el: Η Αναστασία Παναγοπούλου είναι πτυχιούχος Αγγλικής Φιλολογίας και
    κάτοχος του Proficiency του Πανεπιστημίου του Cambridge.
  text1_en: Anastasia Panagopoulou holds a degree in English Literature and a
    Cambridge Proficiency certificate from the University of Cambridge.
  text2_el: Η πορεία της στην εκπαίδευση ξεκίνησε το 1983, όταν άρχισε να διδάσκει
    Αγγλικά σε μαθητές στην Αθήνα και το Κορωπί. Με ιδιαίτερη έμφαση στην
    προετοιμασία για τις εξετάσεις Lower και Proficiency του Michigan, έχει
    αφιερώσει περισσότερες από τέσσερις δεκαετίες στη διδασκαλία και την
    υποστήριξη μαθητών κάθε ηλικίας.
  text2_en: Her journey in education began in 1983, when she started teaching
    English to students in Athens and Koropi. With particular emphasis on
    preparation for Michigan Lower and Proficiency exams, she has devoted more
    than four decades to teaching and supporting students of all ages.
  image: ../Images/anastasia.webp
